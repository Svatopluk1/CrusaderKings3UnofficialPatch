 # All new AUH region laamp returning adventurer outro (might need changes !)
 ep3_laamp_decision_event.1000.desc_outro_regional_world_asia_east_returned_01: "\n\nThe seasons have been very distinct unlike a desert region, with a colourful explosion from one season to the next, though both winter and summer are not the best times to be travelling here."
 ep3_laamp_decision_event.1000.desc_outro_regional_world_asia_east_returned_02: "\n\nSummers can be sweltering and humid with sweat dripping off you like a sticky waterfall, while the winters define the word cold."
 ep3_laamp_decision_event.1000.desc_outro_regional_world_asia_east_returned_03: "\n\nTraversing the mountains, sub tropical jungles and the many islands has revealed ancient histories and civilizations unique to the region."
 ep3_laamp_decision_event.1000.desc_outro_regional_world_asia_east_returned_04: "\n\nMy guide is preparing to return to [dummy_gender.GetHerHis] home after guiding us around the region and without [dummy_gender.GetHerHis] help, I would likely have been eaten by a Tiger or Tiger Shark in the seas."

 ep3_laamp_decision_event.1000.desc_outro_regional_world_asia_north_east_returned_01: "\n\nThe colourful explosion of foliage across the region is breath taking, as are the strange fauna."
 ep3_laamp_decision_event.1000.desc_outro_regional_world_asia_north_east_returned_02: "\n\nI would love to take a beautiful Panda home but the people seem jealously protective of them. My guide seemed to lose [dummy_gender.GetHerHis] temper when I suggested it."
 ep3_laamp_decision_event.1000.desc_outro_regional_world_asia_north_east_returned_03: "\n\nI shall miss the beautiful temples and the cultural centres featuring tea rooms and baths."
 ep3_laamp_decision_event.1000.desc_outro_regional_world_asia_north_east_returned_04: "\n\nThe food has been interesting though the dishes are usually rice or noodle based."

 ep3_laamp_decision_event.1000.desc_outro_regional_world_asia_southeast_returned_01: "\n\nThis has been a world of ancient temples hidden in tropical jungles or invitingly out of reach on top of high mountains and many islands."
 ep3_laamp_decision_event.1000.desc_outro_regional_world_asia_southeast_returned_02: "\n\nIt seems no sooner have you gotten used to walking on land again, you are back in a boat to travel to yet another island."
 ep3_laamp_decision_event.1000.desc_outro_regional_world_asia_southeast_returned_03: "\n\nThe wild life can be strange but no stranger to the women we met in one region that weren't women or maybe they were men that weren't men, my guide has chosen to keep [dummy_gender.GetHerHis] silence on the subject, though did offer to arrange a meeting which I politely refused."
 ep3_laamp_decision_event.1000.desc_outro_regional_world_asia_southeast_returned_04: "\n\nAlthough I am eager to return home, I am equally looking forward to returning to the region to further explore it's #S opportunities#!."

